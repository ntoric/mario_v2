version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mariodb
      POSTGRES_USER: mariodbuser
      POSTGRES_PASSWORD: mariodbpassword
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5555:5432"
    networks:
      - backend

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB_USER: mariodbuser
      DB_PASSWORD: mariodbpassword
      DB_HOST: postgres
      DB_NAME: mariodb

      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20

      ADMIN_USERS: mariodbuser
    ports:
      - "6464:5432"
    networks:
      - backend

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8090:8080"
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge


    psql -h mario-pgbouncer2.ntoric.com -p 5432 -U mariodbuser -d mariodb