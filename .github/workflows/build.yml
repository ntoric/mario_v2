name: Build Electron App

on:
  push:
    branches: [main, master]
    tags:
      - "v*"

  pull_request:
    branches: [main, master]

  workflow_dispatch:

jobs:
  build-mac-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('frontend/package-lock.json') }}

      - name: Build Backend (macOS ARM64)
        run: |
          cd backend
          mkdir -p build
          GOOS=darwin GOARCH=arm64 go build -o build/cafe-backend-darwin-arm64 ./cmd/server

      - name: Build Printer (macOS ARM64)
        run: |
          cd mario-printer
          mkdir -p build
          GOOS=darwin GOARCH=arm64 go build -o build/mario-printer-darwin-arm64 .

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Build Electron App (macOS ARM64)
        run: |
          cd frontend
          npm run electron:build:mac:arm64

      - name: Upload macOS ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mario-juicy-mac-arm64
          path: |
            frontend/release/**/*.dmg
          retention-days: 30

  build-mac-amd64:
    runs-on: macos-13

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('frontend/package-lock.json') }}

      - name: Build Backend (macOS AMD64)
        run: |
          cd backend
          mkdir -p build
          GOOS=darwin GOARCH=amd64 go build -o build/cafe-backend-darwin-amd64 ./cmd/server

      - name: Build Printer (macOS AMD64)
        run: |
          cd mario-printer
          mkdir -p build
          GOOS=darwin GOARCH=amd64 go build -o build/mario-printer-darwin-amd64 .

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Build Electron App (macOS AMD64)
        run: |
          cd frontend
          npm run electron:build:mac:amd64

      - name: Upload macOS AMD64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mario-juicy-mac-amd64
          path: |
            frontend/release/**/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: windows-electron-${{ hashFiles('frontend/package-lock.json') }}

      - name: Build Backend (Windows AMD64)
        shell: bash
        run: |
          cd backend
          mkdir -p build
          GOOS=windows GOARCH=amd64 go build -o build/cafe-backend-windows-amd64.exe ./cmd/server

      - name: Build Printer (Windows AMD64)
        shell: bash
        run: |
          cd mario-printer
          mkdir -p build
          GOOS=windows GOARCH=amd64 go build -o build/mario-printer-windows-amd64.exe .

      - name: Install Frontend Dependencies
        shell: bash
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        shell: bash
        run: |
          cd frontend
          npm run build

      - name: Build Electron App (Windows AMD64)
        shell: bash
        run: |
          cd frontend
          npm run electron:build:win:amd64

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mario-juicy-windows
          path: |
            frontend/release/**/*.exe
          retention-days: 30

  release:
    needs:
      - build-mac-arm64
      - build-mac-amd64
      - build-windows

    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: List Downloaded Files
        run: |
          find . -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mario-juicy-mac-arm64/**/*.dmg
            mario-juicy-mac-amd64/**/*.dmg
            mario-juicy-windows/**/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GTHUB_TOKEN }}