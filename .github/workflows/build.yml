name: Build Electron App

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Build Backend (macOS ARM64)
        run: |
          cd backend
          GOOS=darwin GOARCH=arm64 go build -o build/cafe-backend-darwin-arm64 ./cmd/server
      
      - name: Build Printer (macOS ARM64)
        run: |
          cd mario-printer
          GOOS=darwin GOARCH=arm64 go build -o build/mario-printer-darwin-arm64 .
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
      
      - name: Build Electron (macOS ARM64)
        run: |
          cd frontend
          npm run electron:build:mac:arm64
      
      - name: Upload macOS ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mario-juicy-mac-arm64
          path: frontend/release/*.dmg
          retention-days: 30

  build-mac-amd64:
    runs-on: macos-13  # Intel runner
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Build Backend (macOS AMD64)
        run: |
          cd backend
          GOOS=darwin GOARCH=amd64 go build -o build/cafe-backend-darwin-amd64 ./cmd/server
      
      - name: Build Printer (macOS AMD64)
        run: |
          cd mario-printer
          GOOS=darwin GOARCH=amd64 go build -o build/mario-printer-darwin-amd64 .
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
      
      - name: Build Electron (macOS AMD64)
        run: |
          cd frontend
          npm run electron:build:mac:amd64
      
      - name: Upload macOS AMD64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mario-juicy-mac-amd64
          path: frontend/release/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Build Backend (Windows AMD64)
        run: |
          cd backend
          go build -o build/cafe-backend-windows-amd64.exe ./cmd/server
      
      - name: Build Printer (Windows AMD64)
        run: |
          cd mario-printer
          go build -o build/mario-printer-windows-amd64.exe .
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
      
      - name: Build Electron (Windows AMD64)
        run: |
          cd frontend
          npm run electron:build:win:amd64
      
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mario-juicy-windows
          path: frontend/release/*.exe
          retention-days: 30

  release:
    needs: [build-mac-arm64, build-mac-amd64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            mario-juicy-mac-arm64/*.dmg
            mario-juicy-mac-amd64/*.dmg
            mario-juicy-windows/*.exe
          draft: false
          prerelease: false
